services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: geoclean
      POSTGRES_USER: geoclean
      POSTGRES_PASSWORD: geoclean
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://geoclean:geoclean@postgres:5432/geoclean
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/uploads

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
